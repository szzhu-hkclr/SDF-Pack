# ═════════════════════════════════════════════════════════════════════════════
# FILE: .devin/acronyms.yaml
# VERSION: 1.1 / schema_version: 2
# LAST UPDATED: 2026-03-25
#
# Consumed by: match_policy.yaml → alias_match_policy.tiers[mode=acronym_expansion]
# Direction:   bidirectional — loader builds BOTH:
#                acronym  → full_form  (JD uses bare acronym "MPC")
#                full_form → acronym   (taxonomy alias uses spelled-out form)
#
# ambiguous: false  → single dominant meaning in this robotics domain
#                     scored at confidence_unambiguous (0.95)
# ambiguous: true   → multiple valid robotics interpretations exist
#                     scored at confidence_ambiguous  (0.80)
#                     relies on match_policy.yaml disambiguation_rules
#
# preferred_tracks: non-binding soft hint; disambiguation_rules take precedence
# aliases:          additional full-form spelling variants (e.g. hyphenation)
# notes:            human-reviewer clarification for ambiguous entries
# ═════════════════════════════════════════════════════════════════════════════


        skills:
          python_fundamentals:
            aliases: ["Python", "Python programming", "Python scripting", "Python3", "Python basics", "Python development"]
          cpp_basics:
            aliases: ["C++", "C++ programming", "C++ basics", "pointers", "memory management", "STL", "standard template library"]
          linux_cli:
            aliases: ["Linux", "shell scripting", "bash scripting", "Linux command line", "Unix shell", "command line tools"]
          git_version_control:
            aliases: ["Git", "version control", "Git version control", "GitHub", "GitLab", "source control", "VCS"]
        prerequisites: []

      L1:
        description: "Linear algebra; multivariable calculus; probability & statistics; ODEs"
        skills:
          linear_algebra:
            aliases: ["linear algebra", "matrix decomposition", "eigenvalues", "SVD", "singular value decomposition", "eigendecomposition", "matrix operations"]
          multivariable_calculus:

          convex_optimization:
            aliases: ["convex optimization", "quadratic programming", "QP", "linear programming", "LP", "duality theory", "convex programming", "optimization theory"]
          python_scientific_computing:
            aliases: ["NumPy", "SciPy", "Matplotlib", "scientific computing", "numerical Python", "Python scientific stack", "pandas"]

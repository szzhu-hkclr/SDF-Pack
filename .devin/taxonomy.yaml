version: "1.1"
schema_version: 2
last_updated: "2026-03-25"

level_definitions:
  L0: Fundamentals & Concepts
  L1: Core Theory & Tools
  L2: Intermediate Methods & Frameworks
  L3: Advanced Techniques & Research
  L4: Expert / Cutting-Edge

track_types:
  - foundation
  - methodology
  - application

# ── Tracks ────────────────────────────────────────────────────────────────────

tracks:

  # ──────────────────────────────────────────────────────────────────────────
  T1:
    name: Mathematical & Programming Foundations
    type: foundation
    scope: Mathematics, programming languages, numerical methods, optimization

    levels:

      L0:

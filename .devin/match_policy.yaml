# ─────────────────────────────────────────────────────────────────────────────
# .devin/match_policy.yaml
# ATS alias matching execution policy — consumed by Stage 2 (Extractor) and
# Stage 3 (Orchestrator). Vocabulary lives in taxonomy.yaml.
# ─────────────────────────────────────────────────────────────────────────────
version: "1.1"
schema_version: 2
last_updated: "2026-03-25"

alias_match_policy:

  # ── Normalization ─────────────────────────────────────────────────────────
  normalization:
    lowercase: true
    replace_hyphens_with_spaces: true
    collapse_whitespace: true
    strip_terminal_punctuation: ".,;:!?"
    preserve_internal_specials: ["+", "#", "/", "."]

  # ── Version / variant normalization (NEW) ────────────────────────────────
  version_normalization:
    enabled: true
    strip_version_suffixes: true           # "PyTorch 2.0" → "PyTorch"
    normalize_spacing_in_versioned_ids: true  # "C++17" → "C++", "ROS-2" → "ROS 2"
    canonical_forms:
      "ros2":    "ros 2"
      "ros-2":   "ros 2"
      "python3": "python"
      "c++17":   "c++"
      "c++20":   "c++"

  case_sensitive: false

  # ── JD section extraction weighting (NEW) ────────────────────────────────
  # Applied during Stage 3 JD decomposition before alias matching begins.
  # Weights are multiplied into a token's base confidence before tier resolution.
  jd_section_weights:
    job_title:               2.0   # highest signal — employer's own framing
    required_qualifications: 1.5
    preferred_qualifications: 1.0
    responsibilities:        0.8
    about_company:           0.1   # boilerplate; near-zero

  # ── Tier definitions (evaluated in order; first match per tier recorded) ──
  tiers:
    - mode: exact
      confidence: 1.0

    - mode: acronym_expansion
      direction: bidirectional
      confidence_unambiguous: 0.95
      confidence_ambiguous: 0.80
      acronym_registry: ".devin/acronyms.yaml"

    - mode: lemma
      confidence_formula: "0.88 - (edit_distance * 0.02)"
      confidence_range: [0.78, 0.88]

    - mode: ngram
      ngram_type: word
      n: [2, 3]                    # unigrams excluded — too ambiguous for robotics
      overlap_metric: asymmetric_jaccard   # |intersection| / |alias_tokens|
      min_overlap: 0.70
      confidence_range: [0.55, 0.75]
      # Prevents decomposed single tokens from polluting ngram matching:
      generic_exclusion_list:
        ["control", "planning", "learning", "system", "robot",
         "model", "estimation", "detection", "tracking", "mapping"]

    - mode: semantic
      # Upgraded from all-MiniLM-L6-v2 (22M) for better robotics-domain coverage.
      model: "BAAI/bge-large-en-v1.5"
      model_fallback: "all-MiniLM-L6-v2"   # low-resource / CI environments
      threshold: 0.72
      confidence_range: [0.72, 0.88]
      domain_calibration:
        # (+) = raise threshold (stricter);  (−) = lower threshold (more permissive).
        # BUG FIX: T2/T5/T7 previously used negative values despite stated heavy overlap.
        T1: { threshold_adjustment: +0.03 }  # precise math terms; slight raise to avoid noise
        T2: { threshold_adjustment: +0.07 }  # control terms overlap heavily; must be strict
        T3: { threshold_adjustment: -0.02 }  # perception terms fairly distinct; slight relax
        T4: { threshold_adjustment: +0.02 }  # planning terms overlap heavily; strict
        T5: { threshold_adjustment: +0.05 }  # RL/learning terms overlap widely; stricter
        T6: { threshold_adjustment: +0.03 }  # manipulation terms overlap moderately; moderate strictness
        T7: { threshold_adjustment: +0.04 }  # loco/nav terms bleed into general robotics
        T8: { threshold_adjustment: +0.03 }  # precise system/infra terms; slight raise to avoid noise

  # ── Rare-term / IDF boost (NEW) ──────────────────────────────────────────
  # Boosts confidence for low-frequency technical terms (e.g., "TEASER++", "GICP").
  # Prevents generic terms ("Python") from crowding out rare discriminative terms.
  rarity_boost:
    enabled: true
    strategy: corpus_idf
    background_corpus: ".devin/jd_corpus_idf.json"   # pre-computed IDF table
    max_boost: 0.12
    application_point: before_tier_resolution
    fallback_boost_for_unknown_terms: 0.06            # half max if term absent from corpus

  # ── Skill implication traversal (NEW) ────────────────────────────────────
  # If a higher-level skill is matched, soft-credit its prerequisite ancestors.
  # Improves coverage without stuffing; excluded from bullet generation.
  skill_implication:
    enabled: true
    direction: upward_prerequisite    # match L3 → soft-credit L0/L1/L2 prerequisites
    traversal_depth: 2                # max hops up the prerequisite chain
    coverage_credit: 0.50             # half-credit for implied skills in coverage metrics
    excluded_from_bullet_generation: true

  # ── Cross-tier resolution ─────────────────────────────────────────────────
  cross_tier_resolution:
    strategy: highest_confidence_wins
    tiebreaker: highest_tier_ordinal  # exact(0) > acronym(1) > lemma(2) > ngram(3) > semantic(4)
    multi_match_policy: top_1

  # ── Collision (same tier, multiple skills) ───────────────────────────────
  collision_strategy: longest_then_highest
  # 1. Most tokens in alias (longest match)
  # 2. On tie: highest level (L4 > L0)
  # 3. On tie: apply context_boost and pick highest

  # ── Phrase decomposition ──────────────────────────────────────────────────
  phrase_decomposition:
    enabled: true
    strategy: greedy_longest_first
    min_subphrase_words: 2            # raised from 1; prevents single-token leakage
    try_exhaustive_for_short_phrases: true
    max_tokens_for_exhaustive: 4      # DP decomposition for phrases ≤ 4 tokens

  # ── Context boost ─────────────────────────────────────────────────────────
  context_boost:
    enabled: true
    amount_per_hit: 0.05
    cap: 0.15
    application_point: after_tier_resolution
    promotes_from_review_band: true

  # ── Decision thresholds ───────────────────────────────────────────────────
  min_confidence_for_auto_match: 0.80
  min_confidence_for_inclusion: 0.60
  human_review_band: [0.60, 0.80]
  coverage_targets:
    min_jd_keyword_coverage: 0.65
    target_jd_keyword_coverage: 0.75
    max_jd_keyword_coverage: 0.85

  # ── Disambiguation (handcrafted overrides) ───────────────────────────────
  disambiguation_rules:
    - tokens: ["dynamics"]
      prefer: T2-L2.rigid_body_dynamics
      over: [T2-L0.rigid_body_intuition, T2-L4.centroidal_dynamics]

    - tokens: ["Kalman filter", "EKF", "UKF", "extended Kalman filter", "unscented Kalman filter"]
      prefer: T3-L2.kalman_filter_family
      context_hints: ["SLAM", "localization", "perception", "tracking", "sensor fusion"]
      over: [T2-L2.ekf_ukf]
      # Without context hints, collision_strategy resolves; add a rule for control context:
    - tokens: ["Kalman filter", "EKF", "UKF"]
      prefer: T2-L2.ekf_ukf
      context_hints: ["control", "feedback", "observer", "state space"]
      over: [T3-L2.kalman_filter_family]

    - tokens: ["planning"]
      prefer: T4-L2.sampling_based_motion_planning
      context_hints: ["motion", "path", "trajectory", "RRT", "PRM"]
      over: [T4-L3.task_planning, T4-L4.multi_robot_planning]

    - tokens: ["learning"]
      prefer: T5-L1.rl_fundamentals
      context_hints: ["reinforcement", "reward", "policy", "agent"]
      over: [T5-L0.supervised_unsupervised_learning]

    - tokens: ["control"]
      prefer: T2-L3.model_predictive_control
      context_hints: ["MPC", "predictive", "horizon", "receding"]
      over: [T2-L1.pid_control, T2-L3.impedance_admittance]

    - tokens: ["SLAM"]
      prefer: T3-L2.visual_slam
      context_hints: ["visual", "camera", "ORB", "monocular"]
      over: [T3-L2.lidar_slam]
    - tokens: ["SLAM"]
      prefer: T3-L2.lidar_slam
      context_hints: ["LiDAR", "laser", "3D scan", "point cloud SLAM"]
      over: [T3-L2.visual_slam]

    - tokens: ["simulation", "simulator"]
      prefer: T8-L1.simulation_intro
      context_hints: ["Gazebo", "MuJoCo basics", "physics engine basics"]
      over: [T8-L2.mujoco_environment_setup, T8-L3.isaac_lab]

    - tokens: ["world model"]
      prefer: T5-L4.world_models
      over: [T2-L2.rigid_body_dynamics]  # avoid false match to "model" in dynamics context

  # ── Output policy ─────────────────────────────────────────────────────────
  output_policy:
    acronym_cooccurrence: required      # bullet must contain BOTH full form AND acronym
    first_mention_format: "full_form (ACRONYM)"
    subsequent_mentions: acronym_only

  # ── Section weights for resume assembly ──────────────────────────────────
  section_weights:
    skills_section: 1.0
    summary: 0.9
    first_bullet_per_role: 0.85
    other_bullets: 0.7

  # ── Anti-stuffing ─────────────────────────────────────────────────────────
  anti_stuffing:
    max_keyword_density_pct: 2.5
    max_repetitions_per_keyword: 3
    natural_language_check: true        # flag if same keyword in >2 consecutive bullets